<mat-toolbar color="primary">
  <span>Harry Potter Characters</span>
</mat-toolbar>

<div class="container">
  <div class="filter-section">
    <app-characterfilter (houseSelected)="onFilterChanged($event)"></app-characterfilter>
  </div>

  <div class="character-grid">
    @for (character of characters; track character.id) {
      <mat-card class="character-card" [routerLink]="['/details', character.id]">
        <img mat-card-image [src]="character.image || 'https://placehold.co/200x300?text=No+Image'" [alt]="character.name">
        <mat-card-header>
          <mat-card-title>{{ character.name }}</mat-card-title>
          <mat-card-subtitle>{{ character.house || 'No House' }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-actions>
          <button mat-button color="accent">VIEW DETAILS</button>
        </mat-card-actions>
      </mat-card>
    }
  </div>
</div>
